name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write
  actions: write

jobs:
  release:
    environment: npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:release
      - run: pnpm changeset version
      - run: pnpm --filter @stagecut/core run build && cd packages/core && npm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: pnpm --filter @stagecut/react-player run build && cd packages/react && npm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: pnpm --filter @stagecut/devtools run build && cd packages/devtools && npm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
